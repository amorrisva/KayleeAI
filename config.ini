[paths]
# Staging directory containing UltraTax PDF prints.
# Default: parent of the KayleeAI script directory (O:/IT/CanopyStaging)
staging_dir =

# Canopy client export CSV. Leave blank to auto-detect in Config/ or staging dir.
mapping_csv =

# Output directory for routed client folders.
# Default: <staging_dir>/Routed
output_dir =

[notifications]
# Microsoft Teams incoming webhook URL for processing notifications.
# Create one at: Teams > Channel > Connectors > Incoming Webhook
# teams_webhook = https://outlook.office.com/webhook/...
teams_webhook =
