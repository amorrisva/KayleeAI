[paths]
# Staging directory containing UltraTax PDF prints.
# Default: parent of the KayleeAI script directory (O:/IT/CanopyStaging)
#
# On the server this might be C:/IT/CanopyStaging or a different mount.
# Uncomment and set the correct path when running from the server.
# staging_dir = C:/IT/CanopyStaging
staging_dir =

# Canopy client export CSV. Leave blank to auto-detect in staging dir.
mapping_csv =

# Output directory for routed client folders.
# Default: <staging_dir>/Routed
output_dir =
